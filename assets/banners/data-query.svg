<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="dq-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="dq-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="dq-glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="800" height="200" fill="url(#dq-bg)"/>
  <rect x="0" y="0" width="800" height="4" fill="url(#dq-accent)"/>
  <circle cx="650" cy="100" r="80" fill="#d97706" opacity="0.08" filter="url(#dq-glow)"/>
  <circle cx="150" cy="150" r="60" fill="#f59e0b" opacity="0.06" filter="url(#dq-glow)"/>
  <rect x="40" y="50" width="4" height="100" rx="2" fill="url(#dq-accent)" opacity="0.6"/>
  <text x="60" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#f1f5f9">Data &amp; Query</text>
  <text x="60" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">6 Agents · SQL · ETL · Data Modeling · GraphQL · Time Series · Search</text>
  <rect x="60" y="135" width="60" height="24" rx="12" fill="#d97706" opacity="0.2"/>
  <text x="90" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fcd34d" text-anchor="middle">6 Agents</text>
  <rect x="130" y="135" width="55" height="24" rx="12" fill="#f59e0b" opacity="0.2"/>
  <text x="157" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fde68a" text-anchor="middle">Queries</text>
  <rect x="195" y="135" width="50" height="24" rx="12" fill="#fbbf24" opacity="0.2"/>
  <text x="220" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fef3c7" text-anchor="middle">Data</text>
  <circle cx="720" cy="60" r="3" fill="#f59e0b" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="90" r="2" fill="#fbbf24" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="740" cy="130" r="2.5" fill="#d97706" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
