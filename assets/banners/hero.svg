<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#f778ba"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>
  <rect x="2" y="2" width="1196" height="296" fill="none" stroke="url(#accent)" stroke-width="1" rx="11" opacity="0.3"/>
  <line x1="100" y1="260" x2="1100" y2="260" stroke="url(#accent)" stroke-width="1" opacity="0.2"/>
  <text x="600" y="100" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" fill="#8b949e" letter-spacing="8">CURATED AGENT DEFINITIONS</text>
  <text x="600" y="165" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-weight="800" font-size="64" fill="url(#text-grad)" filter="url(#glow)">🚀 AgentSpace</text>
  <text x="600" y="210" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#8b949e">47 structured agents · 7 categories · Role → Inputs → Process → Output → Guidelines</text>
  <circle cx="200" cy="50" r="2" fill="#58a6ff" opacity="0.5"/>
  <circle cx="400" cy="30" r="1.5" fill="#bc8cff" opacity="0.4"/>
  <circle cx="800" cy="40" r="2" fill="#f778ba" opacity="0.3"/>
  <circle cx="1000" cy="60" r="1.5" fill="#58a6ff" opacity="0.4"/>
</svg>
