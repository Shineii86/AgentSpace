<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="sy-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="sy-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="50%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <filter id="sy-glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="800" height="200" fill="url(#sy-bg)"/>
  <rect x="0" y="0" width="800" height="4" fill="url(#sy-accent)"/>
  <circle cx="650" cy="100" r="80" fill="#dc2626" opacity="0.08" filter="url(#sy-glow)"/>
  <circle cx="150" cy="150" r="60" fill="#ef4444" opacity="0.06" filter="url(#sy-glow)"/>
  <rect x="40" y="50" width="4" height="100" rx="2" fill="url(#sy-accent)" opacity="0.6"/>
  <text x="60" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#f1f5f9">Systems</text>
  <text x="60" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">6 Agents · Shell · Linux · Networking · Containers · Systemd · Log Analysis</text>
  <rect x="60" y="135" width="60" height="24" rx="12" fill="#dc2626" opacity="0.2"/>
  <text x="90" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fca5a5" text-anchor="middle">6 Agents</text>
  <rect x="130" y="135" width="55" height="24" rx="12" fill="#ef4444" opacity="0.2"/>
  <text x="157" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fecaca" text-anchor="middle">DevOps</text>
  <rect x="195" y="135" width="65" height="24" rx="12" fill="#f87171" opacity="0.2"/>
  <text x="227" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fee2e2" text-anchor="middle">SysAdmin</text>
  <circle cx="720" cy="60" r="3" fill="#ef4444" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="90" r="2" fill="#f87171" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="740" cy="130" r="2.5" fill="#dc2626" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
