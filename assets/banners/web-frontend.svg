<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100">
  <defs>
    <style>
      @media (prefers-color-scheme: light) {
        .b-bg { fill: #f8fafc; }
        .b-card { fill: rgba(255,255,255,0.9); stroke: rgba(0,0,0,0.06); }
        .b-title { fill: #0f172a; }
        .b-sub { fill: #64748b; }
        .b-badge { fill: rgba(0,0,0,0.03); stroke: rgba(0,0,0,0.08); }
        .b-badge-t { fill: #1e293b; }
        .b-sep { stroke: rgba(0,0,0,0.06); }
        .b-glow { opacity: 0.06; }
        .b-dot { opacity: 0.15; }
        .b-star { fill: rgba(0,0,0,0.1); }
        .b-line { stroke: rgba(0,0,0,0.04); }
        .b-neb { stop-opacity: 0.04; }
      }
      @media (prefers-color-scheme: dark) {
        .b-bg { fill: #020617; }
        .b-card { fill: rgba(15,23,42,0.7); stroke: rgba(255,255,255,0.05); }
        .b-title { fill: #f1f5f9; }
        .b-sub { fill: #94a3b8; }
        .b-badge { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.08); }
        .b-badge-t { fill: #e2e8f0; }
        .b-sep { stroke: rgba(255,255,255,0.06); }
        .b-glow { opacity: 0.12; }
        .b-dot { opacity: 0.4; }
        .b-star { fill: rgba(255,255,255,0.5); }
        .b-line { stroke: rgba(255,255,255,0.04); }
        .b-neb { stop-opacity: 0.08; }
      }
      .b-p1 { animation: bp 4s ease-in-out infinite; }
      .b-p2 { animation: bp 5s ease-in-out infinite 1.5s; }
      .b-shim { animation: bshim 3s ease-in-out infinite; }
      .s1 { animation: st 2s ease-in-out infinite; }
      .s2 { animation: st 2.8s ease-in-out infinite 0.5s; }
      .s3 { animation: st 3.2s ease-in-out infinite 1s; }
      .s4 { animation: st 2.4s ease-in-out infinite 0.3s; }
      .s5 { animation: st 3s ease-in-out infinite 1.5s; }
      .s6 { animation: st 2.6s ease-in-out infinite 0.8s; }
      .bf1 { animation: bfl 6s ease-in-out infinite; }
      .bf2 { animation: bfl 7s ease-in-out infinite; }
      .bdash { stroke-dasharray: 4 3; animation: bdm 2s linear infinite; }
      @keyframes bp { 0%,100%{opacity:0.15;r:3} 50%{opacity:0.5;r:5} }
      @keyframes bshim { 0%{opacity:0.3} 50%{opacity:0.8} 100%{opacity:0.3} }
      @keyframes st { 0%,100%{opacity:0.15} 50%{opacity:0.7} }
      @keyframes bfl { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
      @keyframes bdm { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-14} }
    </style>
    <linearGradient id="web-frontend-acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="web-frontend-n1" cx="15%" cy="50%">
      <stop offset="0%" stop-color="#6366f1" class="b-neb"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="web-frontend-n2" cx="85%" cy="50%">
      <stop offset="0%" stop-color="#a78bfa" class="b-neb"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="web-frontend-cl"><rect width="1200" height="100" rx="10"/></clipPath>
    <filter id="web-frontend-bl"><feGaussianBlur stdDeviation="15"/></filter>
    <filter id="web-frontend-gw"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g clip-path="url(#web-frontend-cl)">
    <rect width="1200" height="100" class="b-bg"/>
    <rect width="1200" height="100" fill="url(#web-frontend-n1)"/>
    <rect width="1200" height="100" fill="url(#web-frontend-n2)"/>
    <circle cx="80" cy="50" r="80" fill="#6366f1" class="b-glow" filter="url(#web-frontend-bl)"/>
    <circle cx="1120" cy="50" r="60" fill="#a78bfa" class="b-glow" filter="url(#web-frontend-bl)"/>
    <g class="b-line" stroke-width="0.5">
      <line x1="900" y1="20" x2="1000" y2="40"/>
      <line x1="1000" y1="40" x2="950" y2="80"/>
      <line x1="950" y1="80" x2="1100" y2="60"/>
      <line x1="1100" y1="60" x2="1050" y2="25"/>
      <line x1="1050" y1="25" x2="900" y2="20"/>
    </g>
    <g class="b-line bdash" stroke-width="0.5">
      <line x1="920" y1="30" x2="1080" y2="55"/>
      <line x1="980" y1="70" x2="1060" y2="30"/>
    </g>
    <circle cx="1080" cy="30" r="0.8" class="b-star s1"/>
    <circle cx="1120" cy="70" r="0.6" class="b-star s2"/>
    <circle cx="1160" cy="45" r="0.5" class="b-star s3"/>
    <circle cx="1050" cy="80" r="0.7" class="b-star s4"/>
    <circle cx="1140" cy="15" r="0.5" class="b-star s5"/>
    <circle cx="1170" cy="85" r="0.6" class="b-star s6"/>
    <circle cx="900" cy="20" r="4" fill="#6366f1" class="b-dot b-p1" filter="url(#web-frontend-gw)"/>
    <circle cx="900" cy="20" r="2" fill="#6366f1" class="bf1"/>
    <circle cx="1000" cy="40" r="3" fill="#a78bfa" class="b-dot b-p2" filter="url(#web-frontend-gw)"/>
    <circle cx="1000" cy="40" r="1.5" fill="#a78bfa" class="bf2"/>
    <circle cx="950" cy="80" r="3.5" fill="#6366f1" class="b-dot b-p1" filter="url(#web-frontend-gw)"/>
    <circle cx="1100" cy="60" r="2.5" fill="#a78bfa" class="b-dot b-p2" filter="url(#web-frontend-gw)"/>
    <circle cx="1050" cy="25" r="3" fill="#6366f1" class="b-dot b-p1" filter="url(#web-frontend-gw)"/>
    <rect x="12" y="8" width="1176" height="84" rx="10" class="b-card" stroke-width="1"/>
    <rect x="12" y="8" width="5" height="84" rx="2.5" fill="url(#web-frontend-acc)"/>
    <text x="40" y="62" font-family="'SF Pro Display','Segoe UI',sans-serif" font-size="32">🌐</text>
    <text x="90" y="58" font-family="'SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif" font-weight="700" font-size="28" class="b-title">Web & Frontend</text>
    <line x1="328" y1="25" x2="328" y2="75" class="b-sep" stroke-width="1"/>
    <rect x="343" y="32" width="96" height="28" rx="14" class="b-badge" stroke-width="1"/>
    <text x="391" y="51" text-anchor="middle" font-family="'SF Pro Text','Segoe UI',sans-serif" font-size="12" font-weight="600" class="b-badge-t">6 agents</text>
    <text x="457" y="52" font-family="'SF Pro Text','Segoe UI',Helvetica,Arial,sans-serif" font-size="15" class="b-sub">CSS · React · Accessibility · Performance · Responsive · Design Systems</text>
    <rect x="12" y="89" width="1176" height="3" rx="1.5" fill="url(#web-frontend-acc)" opacity="0.35" class="b-shim"/>
  </g>
</svg>