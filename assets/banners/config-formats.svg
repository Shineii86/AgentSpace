<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100">
  <defs>
    <style>
      @media (prefers-color-scheme: light) {
        .cat-bg { fill: #f6f8fa; }
        .cat-card { fill: rgba(255,255,255,0.85); stroke: rgba(0,0,0,0.08); }
        .cat-title { fill: #1f2328; }
        .cat-sub { fill: #656d76; }
        .cat-badge { fill: rgba(0,0,0,0.04); stroke: rgba(0,0,0,0.1); }
        .cat-badge-text { fill: #1f2328; }
        .cat-sep { stroke: rgba(0,0,0,0.08); }
        .cat-glow { opacity: 0.08; }
        .cat-dot { opacity: 0.15; }
        .cat-star { fill: rgba(0,0,0,0.12); }
        .cat-ring { fill:none; stroke:rgba(8,145,178,0.08); }
        .cat-nebula { stop-opacity: 0.06; }
      }
      @media (prefers-color-scheme: dark) {
        .cat-bg { fill: #0d1117; }
        .cat-card { fill: rgba(22,27,34,0.6); stroke: rgba(255,255,255,0.06); }
        .cat-title { fill: #f0f6fc; }
        .cat-sub { fill: #8b949e; }
        .cat-badge { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.08); }
        .cat-badge-text { fill: #c9d1d9; }
        .cat-sep { stroke: rgba(255,255,255,0.06); }
        .cat-glow { opacity: 0.15; }
        .cat-dot { opacity: 0.35; }
        .cat-star { fill: rgba(255,255,255,0.4); }
        .cat-ring { fill:none; stroke:rgba(8,145,178,0.1); }
        .cat-nebula { stop-opacity: 0.1; }
      }
      .cat-pulse1 { animation: cpulse 4s ease-in-out infinite; }
      .cat-pulse2 { animation: cpulse 5s ease-in-out infinite 1.5s; }
      .cat-shimmer { animation: cshimmer 3s ease-in-out infinite; }
      .tw1 { animation: twinkle 2s ease-in-out infinite; }
      .tw2 { animation: twinkle 3s ease-in-out infinite 0.7s; }
      .tw3 { animation: twinkle 2.5s ease-in-out infinite 1.2s; }
      .tw4 { animation: twinkle 3.5s ease-in-out infinite 0.3s; }
      .ring-anim { animation: rexpand 5s ease-out infinite; }
      .ring-anim2 { animation: rexpand 5s ease-out infinite 2.5s; }
      .orb1 { animation: orbit 12s linear infinite; }
      .orb2 { animation: orbit-rev 15s linear infinite; }
      @keyframes cpulse { 0%,100%{opacity:0.15;r:3} 50%{opacity:0.45;r:5} }
      @keyframes cshimmer { 0%{opacity:0.4} 50%{opacity:1} 100%{opacity:0.4} }
      @keyframes twinkle { 0%,100%{opacity:0.15} 50%{opacity:0.6} }
      @keyframes rexpand { 0%{r:0;opacity:0.2;stroke-width:1.5} 100%{r:60;opacity:0;stroke-width:0.3} }
      @keyframes orbit { 0%{transform:rotate(0deg) translateX(20px) rotate(0deg)} 100%{transform:rotate(360deg) translateX(20px) rotate(-360deg)} }
      @keyframes orbit-rev { 0%{transform:rotate(0deg) translateX(15px) rotate(0deg)} 100%{transform:rotate(-360deg) translateX(15px) rotate(360deg)} }
    </style>
    <linearGradient id="cf-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="cf-nebula1" cx="15%" cy="50%">
      <stop offset="0%" stop-color="#0891b2" class="cat-nebula"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cf-nebula2" cx="85%" cy="50%">
      <stop offset="0%" stop-color="#22d3ee" class="cat-nebula"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cf-clip"><rect width="1200" height="100" rx="10"/></clipPath>
    <filter id="cf-blur"><feGaussianBlur stdDeviation="15"/></filter>
    <filter id="cf-glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g clip-path="url(#cf-clip)">
    <rect width="1200" height="100" class="cat-bg"/>
    <rect width="1200" height="100" fill="url(#cf-nebula1)"/>
    <rect width="1200" height="100" fill="url(#cf-nebula2)"/>
    <circle cx="100" cy="50" r="100" fill="#0891b2" class="cat-glow" filter="url(#cf-blur)"/>
    <circle cx="1100" cy="50" r="80" fill="#22d3ee" class="cat-glow" filter="url(#cf-blur)"/>
    <circle cx="1080" cy="30" r="0.8" class="cat-star tw1"/>
    <circle cx="1120" cy="70" r="0.6" class="cat-star tw2"/>
    <circle cx="1160" cy="45" r="0.5" class="cat-star tw3"/>
    <circle cx="1050" cy="80" r="0.7" class="cat-star tw4"/>
    <circle cx="1140" cy="15" r="0.5" class="cat-star tw1"/>
    <circle cx="1170" cy="85" r="0.6" class="cat-star tw3"/>
    <circle cx="1155" cy="55" r="0" class="cat-ring ring-anim"/>
    <circle cx="1140" cy="25" r="0" class="cat-ring ring-anim2"/>
    <rect x="12" y="8" width="1176" height="84" rx="10" class="cat-card" stroke-width="1"/>
    <rect x="12" y="8" width="5" height="84" rx="2.5" fill="url(#cf-accent)"/>
    <circle cx="1140" cy="25" r="3" fill="#0891b2" class="cat-dot cat-pulse1" filter="url(#cf-glow)"/>
    <circle cx="1140" cy="25" r="2" fill="#0891b2" class="orb1"/>
    <circle cx="1160" cy="65" r="2.5" fill="#22d3ee" class="cat-dot cat-pulse2" filter="url(#cf-glow)"/>
    <circle cx="1160" cy="65" r="1.5" fill="#22d3ee" class="orb2"/>
    <text x="40" y="62" font-family="'SF Pro Display','Segoe UI',sans-serif" font-size="32">📝</text>
    <text x="90" y="58" font-family="'SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif" font-weight="700" font-size="28" class="cat-title">Config / Markup / Data Formats</text>
    <line x1="510" y1="25" x2="510" y2="75" class="cat-sep" stroke-width="1"/>
    <rect x="525" y="32" width="88" height="28" rx="14" class="cat-badge" stroke-width="1"/>
    <text x="569" y="51" text-anchor="middle" font-family="'SF Pro Text','Segoe UI',sans-serif" font-size="12" font-weight="600" class="cat-badge-text">6 agents</text>
    <text x="633" y="52" font-family="'SF Pro Text','Segoe UI',Helvetica,Arial,sans-serif" font-size="15" class="cat-sub">YAML · JSON · TOML · Markdown · Env Config · XML/HTML</text>
    <rect x="12" y="89" width="1176" height="3" rx="1.5" fill="url(#cf-accent)" opacity="0.4" class="cat-shimmer"/>
  </g>
</svg>
